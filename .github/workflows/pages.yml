name: Deploy Cert Master (GitHub Pages)

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  # GitHub Actions: Node 20 deprecated; use Node 24 for JavaScript actions.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Static app: no npm install, no bundler. Optional package.json is local-dev only.

      - name: Build SEO pages (questions, cert landings, sitemap)
        run: python3 scripts/build-question-pages.py
        env:
          SITE_ORIGIN: https://practicecert.com

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v4
        with:
          path: .

      - uses: actions/deploy-pages@v4
